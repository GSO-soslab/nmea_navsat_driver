gps_primary:
  ros__parameters:
    # --- Primary GPS ---
    # Serial port settings
    port: "/dev/ttyACM0"
    baud: 9600
    # ROS-specific settings
    frame_id: "gps_primary_link"
    time_ref_source: "gps_primary"
    # NMEA message parsing options
    useRMC: False

gps_secondary:
  ros__parameters:
    # --- Secondary GPS ---
    # Serial port settings
    port: "/dev/ttyUSB0"
    baud: 9600
    # ROS-specific settings
    frame_id: "gps_secondary_link"
    time_ref_source: "gps_secondary"
    # NMEA message parsing options
    useRMC: False